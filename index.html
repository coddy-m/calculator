<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.4s;
    }

    .app {
      background: white;
      width: 440px;
      border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: all 0.4s;
    }

    /* Theme Classes */
    .theme-light { background: #f8f9fa; color: #333; }
    .theme-dark { background: #1e1e2e; color: #eee; }
    .theme-neon { background: #0a0a1f; color: #fff; box-shadow: 0 0 40px #00ffea; }
    .theme-pastel { background: linear-gradient(135deg, #ffe4f3, #e0f7fa); color: #333; }
    .theme-ocean { background: linear-gradient(135deg, #0c4a6e, #164e63); color: #fff; }
    .theme-forest { background: linear-gradient(135deg, #14532d, #166534); color: #fff; }

    .header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .theme-dark .header, .theme-neon .header, .theme-ocean .header, .theme-forest .header { border-color: #444; }

    .tabs {
      display: flex;
      background: #f1f3f5;
    }
    .theme-dark .tabs, .theme-neon .tabs, .theme-ocean .tabs, .theme-forest .tabs { background: #2a2a40; }

    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab.active {
      background: #4CAF50;
      color: white;
    }

    .display {
      background: #1e1e2e;
      color: white;
      padding: 25px 20px;
      text-align: right;
      font-size: 2.3rem;
      min-height: 85px;
      font-weight: 300;
    }

    .converter {
      padding: 20px;
      display: none;
    }
    .converter.active { display: block; }

    .converter select, .converter input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1.1rem;
    }
    .theme-dark .converter select, .theme-dark .converter input,
    .theme-neon .converter select, .theme-neon .converter input { background: #2a2a40; border-color: #555; color: white; }

    .result-conv {
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #4CAF50;
    }

    .buttons {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px 8px;
      font-size: 1.1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:active { transform: scale(0.93); }

    .btn-number { background: #f1f3f5; color: #333; }
    .theme-dark .btn-number, .theme-neon .btn-number { background: #2a2a40; color: #eee; }
    .btn-operator { background: #ff9500; color: white; }
    .btn-equal { background: #4CAF50; color: white; font-weight: bold; }
    .btn-clear { background: #ff3b5c; color: white; }
    .btn-memory { background: #6c757d; color: white; }

    .history {
      max-height: 160px;
      overflow-y: auto;
      padding: 15px 20px;
      background: #f8f9fa;
    }
    .theme-dark .history, .theme-neon .history { background: #2a2a40; }

    .theme-select {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body class="theme-light">
  <div class="app" id="app">
    <!-- Header -->
    <div class="header">
      <div style="font-weight:700; font-size:19px;">Calculator</div>
      <select class="theme-select" onchange="changeTheme(this.value)">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon Glow</option>
        <option value="pastel">Pastel Dream</option>
        <option value="ocean">Ocean</option>
        <option value="forest">Forest</option>
      </select>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">Calculator</div>
      <div class="tab" onclick="switchTab(1)">Converter</div>
      <div class="tab" onclick="switchTab(2)">History</div>
    </div>

    <!-- Calculator Screen -->
    <div id="calc-screen">
      <div class="display" id="display">0</div>
      <div class="buttons" id="buttons"></div>
    </div>

    <!-- Unit Converter Screen -->
    <div id="conv-screen" class="converter">
      <select id="category" onchange="loadUnits()">
        <option value="length">Length</option>
        <option value="weight">Weight</option>
        <option value="temperature">Temperature</option>
        <option value="volume">Volume</option>
        <option value="area">Area</option>
        <option value="speed">Speed</option>
        <option value="time">Time</option>
      </select>

      <input type="number" id="fromValue" placeholder="Value" value="1" oninput="convert()">
      <select id="fromUnit" onchange="convert()"></select>
      <div style="text-align:center; font-size:2rem; margin:10px 0;">↓</div>
      <div class="result-conv" id="convResult">1</div>
      <select id="toUnit" onchange="convert()"></select>
    </div>

    <!-- History Screen -->
    <div id="history-screen" class="converter" style="display:none; padding:20px;">
      <h3 style="margin-bottom:10px;">Calculation History</h3>
      <div id="history-list"></div>
      <button onclick="clearHistory()" style="margin-top:15px; width:100%; padding:12px; background:#ff3b5c; color:white; border:none; border-radius:10px;">Clear History</button>
    </div>

    <div style="text-align:center; padding:12px; font-size:13px; color:#888;">
      Tap tabs • Themes • Persistent data
    </div>
  </div>

  <script>
    // ================== Core Variables ==================
    let currentInput = '0';
    let shouldResetDisplay = false;
    let isScientific = false;
    let memory = 0;
    let history = [];
    let currentTab = 0;

    const display = document.getElementById('display');
    const historyList = document.getElementById('history-list');

    // ================== Unit Converter Data ==================
    const units = {
      length: { m:1, km:1000, cm:0.01, mm:0.001, mile:1609.34, yard:0.9144, foot:0.3048, inch:0.0254 },
      weight: { kg:1, g:0.001, mg:0.000001, lb:0.453592, oz:0.0283495, ton:1000 },
      temperature: { c:1, f:'f', k:'k' },
      volume: { l:1, ml:0.001, m3:1000, gal:3.78541, qt:0.946353, cup:0.236588 },
      area: { m2:1, km2:1000000, cm2:0.0001, acre:4046.86, hectare:10000 },
      speed: { 'm/s':1, 'km/h':0.277778, mph:0.44704, knot:0.514444 },
      time: { s:1, min:60, hour:3600, day:86400, week:604800 }
    };

    function loadUnits() {
      const category = document.getElementById('category').value;
      const fromSelect = document.getElementById('fromUnit');
      const toSelect = document.getElementById('toUnit');
      
      fromSelect.innerHTML = '';
      toSelect.innerHTML = '';
      
      Object.keys(units[category]).forEach(unit => {
        const opt1 = new Option(unit, unit);
        const opt2 = new Option(unit, unit);
        fromSelect.add(opt1);
        toSelect.add(opt2);
      });
      fromSelect.value = Object.keys(units[category])[0];
      toSelect.value = Object.keys(units[category])[1] || Object.keys(units[category])[0];
      convert();
    }

    function convert() {
      const category = document.getElementById('category').value;
      let value = parseFloat(document.getElementById('fromValue').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;

      let result;
      if (category === 'temperature') {
        if (from === 'c' && to === 'f') result = value * 9/5 + 32;
        else if (from === 'f' && to === 'c') result = (value - 32) * 5/9;
        else if (from === 'c' && to === 'k') result = value + 273.15;
        else if (from === 'k' && to === 'c') result = value - 273.15;
        else result = value; // same unit
      } else {
        const base = value * units[category][from];
        result = base / units[category][to];
      }
      document.getElementById('convResult').textContent = parseFloat(result.toFixed(6));
    }

    // ================== Calculator Functions (same as before) ==================
    function createButtons() {
      const container = document.getElementById('buttons');
      container.innerHTML = '';
      const layout = isScientific ? 
        [['MC','MR','M+','M-'],['sin','cos','tan','log'],['ln','√','x²','π'],['C','±','%','÷'],['7','8','9','×'],['4','5','6','-'],['1','2','3','+'],['0','.','=','⌫']] :
        [['MC','MR','M+','M-'],['C','±','%','÷'],['7','8','9','×'],['4','5','6','-'],['1','2','3','+'],['0','.','=','⌫']];

      layout.forEach(row => {
        row.forEach(txt => {
          const btn = document.createElement('button');
          btn.textContent = txt;
          
          if (['MC','MR','M+','M-'].includes(txt)) {
            btn.className = 'btn-memory';
            if (txt==='MC') btn.onclick = () => memory=0;
            if (txt==='MR') btn.onclick = () => { currentInput = memory.toString(); display.textContent = currentInput; };
            if (txt==='M+') btn.onclick = () => memory += parseFloat(currentInput)||0;
            if (txt==='M-') btn.onclick = () => memory -= parseFloat(currentInput)||0;
          } else if (['sin','cos','tan','log','ln','√','x²','π'].includes(txt)) {
            btn.style.background = '#17a2b8';
            btn.style.color = 'white';
            btn.onclick = () => handleScientific(txt);
          } else if (txt === 'C') { btn.className='btn-clear'; btn.onclick = clearDisplay; }
          else if (txt === '=') { btn.className='btn-equal'; btn.onclick = calculate; }
          else if (['÷','×','-','+'].includes(txt)) { btn.className='btn-operator'; btn.onclick = () => appendOperator(txt); }
          else if (txt === '±') btn.onclick = toggleSign;
          else if (txt === '%') btn.onclick = percent;
          else if (txt === '⌫') btn.onclick = backspace;
          else { btn.className = 'btn-number'; btn.onclick = () => appendNumber(txt); }
          
          container.appendChild(btn);
        });
      });
    }

    function appendNumber(num) {
      if (shouldResetDisplay) { currentInput = ''; shouldResetDisplay = false; }
      currentInput = (currentInput === '0' && num !== '.') ? num : currentInput + num;
      display.textContent = currentInput;
    }

    function appendOperator(op) {
      if (shouldResetDisplay) shouldResetDisplay = false;
      if (['+','-','×','÷'].includes(currentInput.slice(-1))) currentInput = currentInput.slice(0,-1);
      currentInput += op;
      display.textContent = currentInput;
    }

    function calculate() {
      try {
        let expr = currentInput.replace(/×/g,'*').replace(/÷/g,'/');
        let result = eval(expr);
        result = parseFloat(result.toFixed(8)).toString();

        history.push({ expr: currentInput, result: result, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        if (history.length > 50) history.shift();
        localStorage.setItem('ultCalcHistory', JSON.stringify(history));
        renderHistory();

        display.textContent = result;
        currentInput = result;
        shouldResetDisplay = true;
      } catch(e) {
        display.textContent = 'Error';
        setTimeout(clearDisplay, 1500);
      }
    }

    function handleScientific(func) {
      let num = parseFloat(currentInput) || 0;
      let res;
      switch(func){
        case 'sin': res = Math.sin(num * Math.PI/180); break;
        case 'cos': res = Math.cos(num * Math.PI/180); break;
        case 'tan': res = Math.tan(num * Math.PI/180); break;
        case 'log': res = Math.log10(num); break;
        case 'ln': res = Math.log(num); break;
        case '√': res = Math.sqrt(num); break;
        case 'x²': res = num*num; break;
        case 'π': res = Math.PI; break;
      }
      currentInput = parseFloat(res.toFixed(8)).toString();
      display.textContent = currentInput;
      shouldResetDisplay = true;
    }

    function clearDisplay() { currentInput = '0'; display.textContent = '0'; shouldResetDisplay = false; }
    function backspace() { 
      if (shouldResetDisplay) return;
      currentInput = currentInput.length <= 1 ? '0' : currentInput.slice(0,-1);
      display.textContent = currentInput;
    }
    function toggleSign() {
      if (currentInput === '0') return;
      currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
      display.textContent = currentInput;
    }
    function percent() {
      currentInput = (parseFloat(currentInput)/100).toString();
      display.textContent = currentInput;
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (history.length === 0) {
        historyList.innerHTML = '<p style="color:#999;text-align:center;">No history yet</p>';
        return;
      }
      history.slice().reverse().forEach(item => {
        const div = document.createElement('div');
        div.style.padding = '8px 0';
        div.style.borderBottom = '1px solid #eee';
        div.innerHTML = `<strong>${item.expr}</strong> = ${item.result} <span style="float:right;color:#888;font-size:12px">${item.time}</span>`;
        historyList.appendChild(div);
      });
    }

    function clearHistory() {
      if (confirm("Clear all history?")) {
        history = [];
        localStorage.setItem('ultCalcHistory', JSON.stringify(history));
        renderHistory();
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===tab));
      
      document.getElementById('calc-screen').style.display = tab===0 ? 'block' : 'none';
      document.getElementById('conv-screen').style.display = tab===1 ? 'block' : 'none';
      document.getElementById('history-screen').style.display = tab===2 ? 'block' : 'none';
      
      if (tab===1) loadUnits();
      if (tab===2) renderHistory();
    }

    function changeTheme(theme) {
      const app = document.getElementById('app');
      app.className = `app theme-${theme}`;
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (currentTab !== 0) return;
      if (e.key >= '0' && e.key <= '9' || e.key === '.') appendNumber(e.key);
      if (e.key === '+') appendOperator('+');
      if (e.key === '-') appendOperator('-');
      if (e.key === '*') appendOperator('×');
      if (e.key === '/') appendOperator('÷');
      if (e.key === 'Enter' || e.key === '=') calculate();
      if (e.key === 'Backspace') backspace();
      if (e.key === 'Escape') clearDisplay();
    });

    // Initialize everything
    function init() {
      const savedHistory = localStorage.getItem('ultCalcHistory');
      if (savedHistory) history = JSON.parse(savedHistory);
      
      createButtons();
      switchTab(0);
      loadUnits();
      display.textContent = currentInput;
      renderHistory();
    }

    window.onload = init;
  </script>
</body>
</html>
